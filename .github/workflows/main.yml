name: Download YouTube Video

on:
  workflow_dispatch: # ما می‌تونیم این را بکشیم تا دستور ورودی رو بدهید
    inputs:
      url:
        description: 'Enter a valid YouTube video URL'
        required: true
        type: string

jobs:
  download-video:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up yt-dlp
        uses: danielmiessler/yt-dlp-action@v3.0.1 # ✅ نسخه مدرن و غیر منقضی
        with:
          url: ${{ inputs.url }}
          output: video.mp4
          
      - name: Upload artifact (new version)
        uses: actions/upload-artifact@v2  # ✅ جایگزین v3 با v2
        with:
          name: downloaded-video
          path: video.mp4
          retention-days: 7

      - name: Display success message
        run: |
          echo "✅ Video downloaded successfully!"
          ls -lh video.mp4
